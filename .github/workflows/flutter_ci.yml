name: Flutter CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Flutter CI Workflow
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./dentzy

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      # Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # Format Dart files (does not fail workflow)
      - name: Format Dart files
        run: dart format .

      # Analyze project
      - name: Analyze project
        run: flutter analyze

      # Run tests only if test folder exists
      - name: Run Flutter tests
        shell: bash
        run: |
          if [ -d test ] && [ "$(find test -type f)" ]; then
            flutter test --coverage
          else
            echo "No Flutter tests found. Skipping..."
          fi

      # Build APK
      - name: Build APK
        run: flutter build apk --release

      # Build App Bundle
      - name: Build AAB
        run: flutter build appbundle --release

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: dentzy/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn

      # Upload AAB
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: dentzy/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: warn

      # Upload coverage
      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: dentzy/coverage/lcov.info
          if-no-files-found: ignore

      # Upload Appium Report
      - name: Upload Appium Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-report
          path: reports/dentzy_appium_test_results.xlsx
          if-no-files-found: ignore

      # Upload Selenium Report
      - name: Upload Selenium Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-report
          path: reports/selenium_test_results.xlsx
          if-no-files-found: ignore

      # Upload Unit Test Report
      - name: Upload Unit Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: reports/unit_test_results.xlsx
          if-no-files-found: ignore

      # Upload Validation Report
      - name: Upload Validation Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: reports/validation_test_results.xlsx
          if-no-files-found: ignore

      # Upload Load Test Report
      - name: Upload Load Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: reports/load_test_results.xlsx
          if-no-files-found: ignore