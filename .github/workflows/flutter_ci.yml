name: Flutter CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Flutter CI Workflow
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./dentzy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format Dart files
        run: dart format .

      - name: Analyze project
        continue-on-error: true
        run: flutter analyze

      - name: Run Flutter tests
        continue-on-error: true
        shell: bash
        run: |
          if [ -d test ] && [ "$(find test -type f)" ]; then
            echo "Running Flutter tests..."
            flutter test --coverage
          else
            echo "No tests found. Skipping."
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: dentzy/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: dentzy/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: warn

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: dentzy/coverage/lcov.info
          if-no-files-found: ignore

      - name: Upload Appium Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-report
          path: reports/dentzy_appium_test_results.xlsx
          if-no-files-found: ignore

      - name: Upload Selenium Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-report
          path: reports/selenium_test_results.xlsx
          if-no-files-found: ignore

      - name: Upload Unit Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: reports/unit_test_results.xlsx
          if-no-files-found: ignore

      - name: Upload Validation Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: reports/validation_test_results.xlsx
          if-no-files-found: ignore

      - name: Upload Load Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: reports/load_test_results.xlsx
          if-no-files-found: ignore